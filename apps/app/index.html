    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:url" content="https://www.phived.com/app" />

      rel="stylesheet"
    />
    <!-- No-flash theme boot. Intentionally mirrors apps/web/src/layouts/Base.astro
    and getStoredThemePreference() in src/utils/isThemeSetToDark.ts. Stored
    values: "system" (follow OS), "dark", "light". Missing or invalid values
    are treated as "system". -->
    <script>
      const localStorageTheme = localStorage.getItem("theme");
      const isBrowserDark =
        window?.matchMedia?.("(prefers-color-scheme: dark)")?.matches ?? false;
      const isDarkMode =
        localStorageTheme === "dark" ||
        (localStorageTheme !== "light" && isBrowserDark);

      if (isDarkMode) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9fafb;
      }
      html.dark #app-splash {
        background: #0a0c10;
      }
      .app-splash-spinner {
        width: 28px;
        height: 28px;
        border-radius: 9999px;
        border: 3px solid rgba(0, 0, 0, 0.15);
        border-top-color: #000;
        animation: app-splash-spin 0.7s linear infinite;
      }
      html.dark .app-splash-spinner {
        border-color: rgba(255, 255, 255, 0.15);
        border-top-color: #fff;
      }
      @keyframes app-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-splash-spinner {
          animation: none;
        }
      }
    </style>
  </head>

  <body class="h-full w-full">
    <div class="h-full w-full" id="root">
      <div id="app-splash" aria-hidden="true">
        <div class="app-splash-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
